# --- Datasource ---
# Entorno local: Dev Services de Quarkus levanta PostgreSQL automaticamente si Docker esta activo.
# No se requiere configuracion adicional para desarrollo local.

# Entorno OpenShift: la URL JDBC, usuario y contrasena se inyectan via variables de entorno.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:}
quarkus.datasource.username=${DB_USER:}
quarkus.datasource.password=${DB_PASSWORD:}

# Solo para fines didacticos del laboratorio
quarkus.hibernate-orm.database.generation=update

quarkus.hibernate-orm.log.sql=false

# Puerto
quarkus.http.port=8080

# Configuracion del Cliente REST - Middleware Interfisa
quarkus.rest-client."middleware-api".url=${MIDDLEWARE_URL:http://10.1.0.83:8092}
quarkus.rest-client."middleware-api".scope=jakarta.inject.Singleton

# Token JWT (inyectado via variable de entorno en OpenShift)
interfisa.jwt.token=${JWT_TOKEN:token_dummy_local}

# OpenShift deployment config
quarkus.openshift.route.expose=true
quarkus.openshift.resources.requests.cpu=250m
quarkus.openshift.resources.requests.memory=256Mi
quarkus.openshift.resources.limits.cpu=500m
quarkus.openshift.resources.limits.memory=512Mi
